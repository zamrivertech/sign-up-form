<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup Form</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <main>
        <section class="left">
            <div class="logo">
                <img src="./img/odin-lined.png" alt="The Odin Project Logo">
                <span>ODIN</span>
            </div>
            <p>Photo by <a href="https://unsplash.com/@exoticsloth">Bestaid Garcia</a> on <a href="https://unsplash.com/">Unsplash</a></p>
        </section>
        <section class="right">

            <div class="form-desc">
                
            <p>This is not a real online service! You know you need something
               like this in your life to help you realize your deepest dreams.  
               <br>
               Sign up <em>now</em> to get started.
            </p>

            <p>You <em>know</em> you want to.</p>

            </div>

            <form>
                          

                <fieldset>

                <p>Let's do this!</p>                    

                <div class="form-row">    
                    <div>
                        <label for="first_name">FIRST NAME
                            <input type="text" id="first_name" name="user_fname" required>
                        </label>
                    </div>

                    <div>
                        <label for="last_name">LAST NAME
                            <input type="text" id="last_name" name="user_lname" required>
                        </label>
                    </div>
                </div>

                <div class="form-row">                  
                    <div>
                        <label for="mail">EMAIL
                            <input type="email" id="mail" name="user_email" required>
                        </label>
                    </div>

                    <div>
                        <label for="phone_number">PHONE NUMBER
                            <input type="tel" id="phone_number" name="user_phone_number" required>
                        </label>
                    </div>  
                </div> 
                
                <div class="form-row">                  
                    <div>
                        <label for="pwd">PASSWORD
                            <input type="password" id="pwd" name="user_pwd" required>
                        </label>
                    </div>

                    <div>
                        <label for="confirm_pwd">CONFIRM PASSWORD
                            <input type="password" id="confirm_pwd" name="confirm_user_pwd" required>
                        </label>
                    </div>   
                </div>   


                </fieldset>
                
                <div class="submit">
                    <button type="submit">Create Account</button>
                    <p>Already have an account? <a href="https://youtu.be/dQw4w9WgXcQ?si=U4uJuErqPrZeSUEN">Log in</a></p>
                </div>

            </form>

        </section>
    </main>
    
</body>
</html>
